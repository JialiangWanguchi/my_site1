<!DOCTYPE html>
<html lang="en">
<head>

    <style>

        body { background-color: #fdfaf6; font-family: 'DM Serif Display', serif; margin: 0; padding: 0; color: #2d3e32; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-image: radial-gradient(circle at 10% 20%, rgba(216, 241, 230, 0.46) 0.1%, rgba(233, 226, 226, 0.28) 90.1%); }

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap" rel="stylesheet">
