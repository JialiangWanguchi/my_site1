<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v2 | Brutalist</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #ffea00; color: #000; font-family: "Impact", "Arial Black", sans-serif; padding: 0; margin: 0; border: 20px solid black; min-height: 100vh; }
        .hero { padding: 4rem; border-bottom: 10px solid black; }
        h1 { font-size: 8rem; text-transform: uppercase; margin: 0; line-height: 0.9; }
        p { font-size: 2rem; font-family: "Courier New", Courier, monospace; font-weight: bold; margin-top: 1rem; }
        .cta { background: #000; color: #fff; padding: 2rem; font-size: 3rem; text-align: center; border: none; cursor: pointer; display: block; width: 100%; transition: transform 0.1s; }
        .cta:hover { transform: translate(-5px, -5px); box-shadow: 10px 10px 0 black; background: #fff; color: #000; }
        .features { display: flex; flex-wrap: wrap; }
        .feature { flex: 1; min-width: 300px; padding: 2rem; border-right: 10px solid black; font-size: 1.5rem; }
        .feature:last-child { border-right: none; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Aether</h1>
        <p>WRITE. NOTHING ELSE.</p>
    </div>
    <button class="cta">JOIN THE VOID</button>
    <div class="features">
        <div class="feature">NO DISTRACTIONS</div>
        <div class="feature">NO BUTTONS</div>
        <div class="feature">NO MERCY</div>
    </div>
</body>
</html>
