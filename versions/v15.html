<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v15 | The Focused Layout</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #fafafa; color: #111; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 2rem; }
        .centered-content { max-width: 800px; text-align: center; }
        .breadcrumb { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2rem; color: #999; margin-bottom: 2rem; }
        h1 { font-size: 4rem; font-weight: 700; letter-spacing: -2px; margin: 0; line-height: 1.1; }
        p { font-size: 1.5rem; color: #666; margin: 2rem 0; line-height: 1.6; font-weight: 400; }
        .cta { display: inline-block; padding: 1.5rem 4rem; background: #000; color: #fff; text-decoration: none; border-radius: 50px; font-weight: 600; font-size: 1.25rem; transition: all 0.3s; }
        .cta:hover { transform: scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .footer-note { font-size: 0.8rem; color: #ccc; margin-top: 4rem; }
    </style>
</head>
<body>
    <div class="centered-content">
        <div class="breadcrumb">Version 15 · Iteration · Focus</div>
        <h1>Pure Clarity.</h1>
        <p>Distilled from the best of v5 and v13. Aether v15 removes the sidebar to focus entirely on the core value proposition: distraction-free writing.</p>
        <a href="#" class="cta">Begin Your Draft</a>
        <div class="footer-note">Crafted for those who live in their thoughts.</div>
    </div>
</body>
</html>
