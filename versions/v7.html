<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v7 | Bauhaus Geometric</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #e0e0e0; font-family: 'Futura', 'Arial', sans-serif; display: flex; margin: 0; height: 100vh; padding: 2rem; gap: 2rem; overflow: hidden; }
        .sidebar { flex: 1; background: #c20000; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-between; padding: 2rem; box-shadow: 10px 10px 0 #000; }
        .main-content { flex: 2; display: grid; grid-template-rows: 2fr 1fr; gap: 2rem; }
        .grid-box { border: 15px solid #000; display: flex; align-items: center; justify-content: center; background: #fff; position: relative; overflow: hidden; }
        .circle { width: 300px; height: 300px; background: #fcba03; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 5px solid black; }
        h1 { font-size: 5rem; margin: 0; font-weight: bold; text-transform: uppercase; color: #000; line-height: 1; }
        .cta-box { background: #0030cf; border: 15px solid #000; display: flex; align-items: center; justify-content: center; color: white; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: background 0.3s; }
        .cta-box:hover { background: #000; }
        p { font-size: 1.2rem; line-height: 1.4; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <p>AETHER<br>SYSTEM<br>1923-2026</p>
        <p>ART AND TECHNOLOGY<br>A NEW UNITY</p>
    </div>
    <div class="main-content">
        <div class="grid-box">
            <div class="circle">
                <h1>A</h1>
                <h1>E</h1>
            </div>
        </div>
        <div class="cta-box">Enter</div>
    </div>
</body>
</html>
