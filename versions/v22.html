<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v22 | Button Stylings</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .hero { max-width: 900px; text-align: center; }
        h1 { font-size: 8rem; font-weight: 900; letter-spacing: -6px; margin: 0; line-height: 0.9; }
        p { font-size: 1.25rem; color: #888; margin: 3rem 0; font-weight: 400; line-height: 1.8; max-width: 600px; margin-left: auto; margin-right: auto; }
        .cta { display: inline-block; padding: 1.5rem 6rem; background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.2); text-decoration: none; border-radius: 100px; font-weight: 800; font-size: 1.25rem; transition: all 0.4s; }
        .cta:hover { background: #fff; color: #000; box-shadow: 0 0 50px rgba(255,255,255,0.1); }
        .v-label { font-size: 0.75rem; color: #333; margin-top: 4rem; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>STILLNESS.</h1>
        <p>In v22, we experiment with an outlined button. The goal is to make the interface feel even lighter, pushing the "Aether" concept further into the background.</p>
        <a href="#" class="cta">Begin Your Draft</a>
    </div>
    <div class="v-label">Refinement 22 / Outlined Button Style</div>
</body>
</html>
