<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v14 | Glass + Minimalist</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-image: radial-gradient(circle at 10% 20%, #1a1a1a 0%, #000 90%); }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px); border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.1); width: 80%; max-width: 1000px; padding: 6rem; display: flex; align-items: center; justify-content: space-between; gap: 4rem; }
        .text-content { flex: 1; }
        h1 { font-size: 5rem; font-weight: 800; letter-spacing: -2px; margin: 0; }
        p { font-size: 1.25rem; color: #888; margin-top: 1.5rem; line-height: 1.6; }
        .cta { display: inline-block; padding: 1rem 2.5rem; background: #fff; color: #000; text-decoration: none; border-radius: 12px; font-weight: 600; margin-top: 2.5rem; transition: all 0.3s; }
        .cta:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1); }
        .visual { width: 300px; height: 300px; background: linear-gradient(135deg, #444, #111); border-radius: 20px; position: relative; overflow: hidden; opacity: 0.5; }
        .visual::after { content: ""; position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 30% 30%, #555, transparent); }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="text-content">
            <h1>Refined.</h1>
            <p>Combining the glassmorphism of v9 with the Apple-style precision of v5. Aether v14 is where elegance meet performance.</p>
            <a href="#" class="cta">Get Access</a>
        </div>
        <div class="visual"></div>
    </div>
</body>
</html>
