<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v23 | Contrast Adjustments</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .hero { max-width: 900px; text-align: center; }
        h1 { font-size: 8rem; font-weight: 900; letter-spacing: -6px; margin: 0; line-height: 0.9; color: #f4f4f4; }
        p { font-size: 1.25rem; color: #666; margin: 3rem 0; font-weight: 400; line-height: 1.8; max-width: 600px; margin-left: auto; margin-right: auto; }
        .cta { display: inline-block; padding: 1.5rem 6.5rem; background: #fff; color: #000; text-decoration: none; border-radius: 100px; font-weight: 800; font-size: 1.25rem; transition: all 0.3s; }
        .cta:hover { background: #ddd; transform: translateY(-5px); }
        .v-label { font-size: 0.75rem; color: #222; margin-top: 4rem; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>STILLNESS.</h1>
        <p>In v23, we've adjusted the contrast of the subtle backgrounds and font shades. The black is now slightly off-black (#050505) and the body text is a more muted grey for better readability in dark environments.</p>
        <a href="#" class="cta">Start Your Journey</a>
    </div>
    <div class="v-label">Refinement 23 / Contrast & Shadows</div>
</body>
</html>
