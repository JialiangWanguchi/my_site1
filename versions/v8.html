<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v8 | Split-Screen</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Inter', sans-serif; overflow: hidden; background: #fff; }
        .left { flex: 1; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; padding: 4rem; position: relative; }
        .right { flex: 1; background: #fff; color: #000; display: flex; flex-direction: column; justify-content: center; padding: 4rem; }
        h1 { font-size: 8rem; margin: 0; line-height: 0.8; letter-spacing: -0.05em; font-weight: 900; }
        p { font-size: 1.5rem; margin-top: 2rem; max-width: 400px; color: #888; line-height: 1.4; }
        .cta { display: inline-block; padding: 1.5rem 3rem; background: #000; color: #fff; text-decoration: none; font-size: 1.25rem; font-weight: bold; margin-top: 3rem; transition: all 0.3s; }
        .cta:hover { background: #333; transform: scale(1.05); }
        .number { font-size: 10rem; position: absolute; top: 2rem; left: 2rem; opacity: 0.1; }
    </style>
</head>
<body>
    <div class="left">
        <div class="number">01</div>
        <h1>Focus</h1>
        <p>The left brain is for structure, discipline, and the foundation of your ideas.</p>
    </div>
    <div class="right">
        <h1>Flow</h1>
        <p>The right brain is for creativity, expression, and the soul of your writing.</p>
        <a href="#" class="cta">Connect Them Now</a>
    </div>
</body>
</html>
