<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v11 | Neo-Skeuomorphism</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #f0f0f0; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #444; }
        .neu-card { background: #f0f0f0; padding: 4rem; border-radius: 50px; box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff; width: 600px; text-align: center; }
        h1 { font-size: 4rem; font-weight: 800; margin-bottom: 2rem; color: #1a1a1a; text-shadow: 1px 1px 2px rgba(255,255,255,0.8), -1px -1px 2px rgba(0,0,0,0.1); }
        .neu-input { background: #f0f0f0; border: none; padding: 1.5rem; border-radius: 20px; box-shadow: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff; width: 100%; font-size: 1.25rem; color: #444; outline: none; margin-bottom: 3rem; }
        .neu-btn { background: #f0f0f0; border: none; padding: 1.5rem 3rem; border-radius: 20px; font-size: 1.5rem; font-weight: bold; color: #444; box-shadow: 5px 5px 10px #bebebe, -5px -5px 10px #ffffff; cursor: pointer; transition: all 0.2s; }
        .neu-btn:active { box-shadow: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff; transform: translateY(2px); }
    </style>
</head>
<body>
    <div class="neu-card">
        <h1>Aether</h1>
        <p>A soft, tactile place for your hard thoughts.</p>
        <div style="margin: 3rem 0;">
            <input type="text" class="neu-input" placeholder="Type your first sentence...">
        </div>
        <button class="neu-btn">Start Writing</button>
    </div>
</body>
</html>
