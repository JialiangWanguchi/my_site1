<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v21 | Micro-Animations Idea</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .hero { max-width: 900px; text-align: center; animation: fadeIn 2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 8rem; font-weight: 900; letter-spacing: -6px; margin: 0; line-height: 0.9; }
        p { font-size: 1.25rem; color: #888; margin: 3rem 0; font-weight: 400; line-height: 1.8; max-width: 600px; margin-left: auto; margin-right: auto; }
        .cta { display: inline-block; padding: 1.5rem 5rem; background: #fff; color: #000; text-decoration: none; border-radius: 100px; font-weight: 800; font-size: 1.25rem; transition: background 0.3s, transform 0.3s; }
        .cta:hover { background: #ddd; transform: translateY(-5px); }
        .v-label { font-size: 0.75rem; color: #333; margin-top: 4rem; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>STILLNESS.</h1>
        <p>In v21, we add subtle micro-animations to the entrance of the page. A gentle fade-in and slide-up to welcome the writer into their digital sanctuary.</p>
        <a href="#" class="cta">Start Your Trial</a>
    </div>
    <div class="v-label">Refinement 21 / Micro-Animations Added</div>
</body>
</html>
