<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v16 | Typography Refinement</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;600&family=Inter:wght@400;700&display=swap');
        * { box-sizing: border-box; }
        body { background: #fff; color: #111; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 2rem; }
        .content { max-width: 900px; }
        h1 { font-family: 'Crimson Pro', serif; font-size: 6rem; font-weight: 300; letter-spacing: -2px; margin: 0; font-style: italic; color: #333; line-height: 1; }
        p { font-size: 1.25rem; font-weight: 400; color: #777; max-width: 500px; margin: 2rem 0; line-height: 1.8; }
        .cta { display: inline-flex; align-items: center; gap: 15px; font-weight: 700; text-decoration: none; color: #000; font-size: 1.5rem; transition: gap 0.3s; }
        .cta:hover { gap: 25px; }
        .cta::after { content: "→"; font-size: 2rem; margin-top: -5px; }
        .header { position: absolute; top: 3rem; left: 3rem; font-weight: 900; letter-spacing: 0.5rem; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header">Aether / v16</div>
    <div class="content">
        <h1>Write with Soul.</h1>
        <p>In v16, we re-introduce the editorial serif typography of v3 into the minimalist frame of v15. A perfect blend of classic and modern.</p>
        <a href="#" class="cta">Start Writing</a>
    </div>
</body>
</html>
