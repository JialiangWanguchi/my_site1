<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v6 | Cyberpunk</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto+Mono:wght@300&display=swap');
        * { box-sizing: border-box; }
        body { background-color: #050505; color: #00ffcc; font-family: 'Roboto Mono', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background: radial-gradient(circle, #1a0033 0%, #050505 70%); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 8rem; font-weight: 900; margin: 0; text-transform: uppercase; color: #ff00ff; text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff; letter-spacing: 1rem; position: relative; }
        h1::before { content: "AETHER"; position: absolute; top: 0; left: -2px; text-shadow: 2px 0 #00ffff; clip-path: inset(44% 0 1% 0); animation: glitch 0.3s infinite linear alternate-reverse; }
        p { font-size: 1.5rem; color: #00ffff; margin-top: 1rem; letter-spacing: 0.3rem; text-transform: uppercase; }
        .cta { margin-top: 2rem; padding: 1.5rem 4rem; font-family: 'Orbitron', sans-serif; background: transparent; border: 2px solid #00ffff; color: #00ffff; font-size: 1.2rem; cursor: pointer; position: relative; transition: all 0.3s; z-index: 10; }
        .cta:hover { background: #00ffff; color: #000; box-shadow: 0 0 50px #00ffff; }
        .grid-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(#00ffff0a 1px, transparent 1px), linear-gradient(90deg, #00ffff0a 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; }
        @keyframes glitch { 0% { clip-path: inset(80% 0 0% 0); transform: translate(-2px, -2px); } 100% { clip-path: inset(10% 0 80% 0); transform: translate(2px, 2px); } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <section class="hero">
        <h1>AETHER</h1>
        <p>REPROGRAM YOUR REALITY</p>
        <button class="cta">INITIALIZE LINK</button>
    </section>
</body>
</html>
