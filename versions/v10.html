<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v10 | Typographic Bold</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 4rem; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        h1 { font-size: 15vw; font-weight: 900; line-height: 0.8; margin: 0; letter-spacing: -0.05em; text-transform: uppercase; }
        p { font-size: 3rem; font-weight: 300; margin-top: 2rem; max-width: 800px; color: #666; letter-spacing: -0.02em; }
        .cta { font-size: 3rem; font-weight: 700; color: #fff; text-decoration: none; border-bottom: 5px solid #fff; padding-bottom: 1rem; display: inline-block; margin-top: 4rem; transition: color 0.3s, border-color 0.3s; }
        .cta:hover { color: #888; border-color: #888; }
        .bg-text { position: absolute; top: 0; right: -10vw; font-size: 40vw; font-weight: 900; color: #111; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>
    <div class="bg-text">WRITE</div>
    <h1>AETHER</h1>
    <p>THE ULTIMATE SPACE FOR YOUR THOUGHTS. NOTHING MORE. NOTHING LESS.</p>
    <a href="#" class="cta">JOIN THE MOVEMENT</a>
</body>
</html>
