<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v18 | Evolved Palette</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap');
        * { box-sizing: border-box; }
        body { background: #fdfdfd; color: #1a1a1a; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 2rem; }
        .hero { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; }
        .content { display: flex; flex-direction: column; }
        h1 { font-size: 7rem; font-weight: 900; letter-spacing: -6px; margin: 0; line-height: 0.8; color: #000; }
        p { font-size: 1.25rem; color: #555; margin: 2.5rem 0; line-height: 1.6; max-width: 450px; }
        .cta { display: inline-flex; align-items: center; justify-content: center; background: #000; color: #fff; text-decoration: none; padding: 1.5rem 4rem; border-radius: 100px; font-weight: 700; font-size: 1.25rem; align-self: flex-start; transition: all 0.3s; }
        .cta:hover { transform: scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .visual-block { width: 100%; height: 500px; background: #f4f4f4; border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: 900; color: #ddd; border: 1px solid #eee; overflow: hidden; position: relative; }
        .visual-block::after { content: ""; position: absolute; width: 200%; height: 200%; background: linear-gradient(135deg, rgba(0,0,0,0.02), transparent); top: -50%; left: -50%; transform: rotate(-45deg); }
    </style>
</head>
<body>
    <div class="hero">
        <div class="visual-block">AE</div>
        <div class="content">
            <h1>Refine.</h1>
            <p>v18 takes the bold layout of v13 and the minimal color palette of v5 to create a professional, premium writing environment. Pure focus, maximum clarity.</p>
            <a href="#" class="cta">Get Started Free</a>
        </div>
    </div>
</body>
</html>
