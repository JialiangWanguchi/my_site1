<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | The Minimalist Writing Space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --accent: #888888;
            --button-bg: #ffffff;
            --button-fg: #000000;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            text-align: center;
            padding: 2rem;
            animation: emerge 1.5s var(--transition);
        }

        @keyframes emerge {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4rem;
            color: #444;
            margin-bottom: 3rem;
            font-weight: 700;
        }

        h1 {
            font-size: clamp(4rem, 12vw, 10rem);
            font-weight: 900;
            letter-spacing: -0.06em;
            line-height: 0.85;
            margin-bottom: 2.5rem;
            background: linear-gradient(180deg, #fff 0%, #333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: var(--accent);
            max-width: 550px;
            margin: 0 auto 4rem;
            line-height: 1.6;
            font-weight: 300;
            letter-spacing: -0.01em;
        }

        .cta-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
        }

        .cta-primary {
            background-color: var(--button-bg);
            color: var(--button-fg);
            text-decoration: none;
            padding: 1.25rem 4rem;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: var(--transition);
            border: 1px solid var(--button-bg);
        }

        .cta-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.1);
            background-color: #eee;
        }

        .cta-secondary {
            color: var(--fg);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: var(--transition);
            opacity: 0.6;
        }

        .cta-secondary:hover {
            opacity: 1;
        }

        footer {
            position: absolute;
            bottom: 3rem;
            font-size: 0.75rem;
            color: #222;
            letter-spacing: 0.1em;
        }

        /* Subtle ambient glow */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="container">
        <div class="badge">Distilled Selection</div>
        <h1>AE<br>THER.</h1>
        <p>The ultimate space for your thoughts. Distraction-free, local-first, and designed for pure focus.</p>
        
        <div class="cta-group">
            <a href="#" class="cta-primary">Get Started</a>
            <a href="#" class="cta-secondary">View Demo</a>
        </div>
    </div>

    <footer>V25.0 // FINAL ITERATION</footer>
</body>
</html>
