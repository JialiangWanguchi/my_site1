<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether v5 | Apple-Style Minimal</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #fff; color: #1d1d1f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        .nav { padding: 1rem; text-align: center; font-size: 0.9rem; font-weight: 400; color: #515154; }
        .hero { padding: 8rem 2rem; text-align: center; }
        h1 { font-size: 5rem; font-weight: 600; letter-spacing: -0.05em; margin: 0; line-height: 1.1; }
        .subheading { font-size: 1.75rem; color: #86868b; margin-top: 1rem; font-weight: 400; }
        .cta-container { margin-top: 3rem; }
        .cta { background: #0071e3; color: #fff; padding: 1rem 2rem; border-radius: 980px; text-decoration: none; font-size: 1.25rem; font-weight: 500; transition: all 0.3s; }
        .cta:hover { background: #0077ed; opacity: 0.9; }
        .feature-grid { display: flex; max-width: 1200px; margin: 4rem auto; gap: 2rem; padding: 0 2rem; }
        .feature { flex: 1; padding: 2rem; background: #fbfbfd; border-radius: 20px; text-align: center; }
        .feature h3 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .feature p { font-size: 1rem; color: #86868b; }
    </style>
</head>
<body>
    <div class="nav">Aether v5</div>
    <section class="hero">
        <h1>Beautifully simple.</h1>
        <p class="subheading">The writing experience, redefined.</p>
        <div class="cta-container">
            <a href="#" class="cta">Start Writing Free</a>
        </div>
    </section>
    <div class="feature-grid">
        <div class="feature"><h3>Retina Font Rendering</h3><p>Crisp, clear text on any device.</p></div>
        <div class="feature"><h3>Zero Distraction</h3><p>Focus on what matters most.</p></div>
        <div class="feature"><h3>iCloud Sync</h3><p>Write anywhere, anytime.</p></div>
    </div>
</body>
</html>
